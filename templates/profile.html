{% extends 'base.html' %}
{% load static %}

{% block content %}
<h1>Profil</h1>
<div class="profile-card">
    {% if user.is_authenticated %}
    <p>Foydalanuvchi: {{ user.username }}</p>
    {% if user.profile.image %}
    <img src="{{ user.profile.image.url }}" alt="Profil rasmi">
    {% else %}
    <p>Profil rasmi yo'q</p>
    {% endif %}
    {% else %}
    <p>Avval tizimga kiring.</p>
    {% endif %}
</div>
{% endblock %}
