{% extends 'base.html' %}
{% load static %}

{% block content %}
<h1>Yangiliklar</h1>

<div class="grid">
    {% for item in news_list %}
    <div class="card">
        {% if item.image %}
        <img src="{{ item.image.url }}" alt="{{ item.title }}">
        {% endif %}
        <h3>{{ item.title }}</h3>
        <p>{{ item.content|truncatewords:20 }}</p>
    </div>
    {% empty %}
    <p>Yangiliklar topilmadi.</p>
    {% endfor %}
</div>
{% endblock %}
